global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    platform: vulnops
    env: local

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: ingest
    static_configs:
      - targets: ["ingest:8000"]
    metrics_path: /metrics

  - job_name: prioritizer
    static_configs:
      - targets: ["prioritizer:8000"]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
